<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Componentes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background-color: #f4f4f4;
    }

    .card img{
      height: 200px;
      object-fit: cover;
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

      <a class="navbar-brand" href="#">
        Meu Site
      </a>

      <button class="navbar-toggler"
      data-bs-toggle="collapse"
      data-bs-target="#menu">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="#">
              Início
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Sobre
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Contato
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <div class="container mt-4">

    <!-- ALERT -->
    <div class="alert alert-success">
      Página criada com Bootstrap 5.3
    </div>

    <!-- FORM -->
    <div class="mb-4">

      <input type="text"
      class="form-control"
      placeholder="Digite seu nome">

    </div>

    <!-- BUTTONS -->
    <div class="mb-4">

      <button class="btn btn-primary">
        Salvar
      </button>

      <button class="btn btn-danger">
        Excluir
      </button>

      <button class="btn btn-success">
        Confirmar
      </button>

    </div>

    <!-- GRID + CARD -->
    <div class="row g-4">

      <div class="col-md-4">

        <div class="card">

          <img src="https://picsum.photos/400/300?1"
          class="card-img-top">

          <div class="card-body">

            <h5 class="card-title">
              Card Bootstrap
            </h5>

            <p class="card-text">
              Exemplo utilizando Bootstrap.
            </p>

            <a href="#"
            class="btn btn-dark">

              Ver Mais

            </a>

          </div>

        </div>

      </div>

      <div class="col-md-4">

        <div class="card">

          <img src="https://picsum.photos/400/300?2"
          class="card-img-top">

          <div class="card-body">

            <h5 class="card-title">
              Outro Card
            </h5>

            <p class="card-text">
              Sistema responsivo com Grid.
            </p>

            <a href="#"
            class="btn btn-dark">

              Ver Mais

            </a>

          </div>

        </div>

      </div>

      <div class="col-md-4">

        <div class="card">

          <img src="https://picsum.photos/400/300?3"
          class="card-img-top">

          <div class="card-body">

            <h5 class="card-title">
              Bootstrap 5.3
            </h5>

            <p class="card-text">
              Componentes modernos e responsivos.
            </p>

            <a href="#"
            class="btn btn-dark">

              Ver Mais

            </a>

          </div>

        </div>

      </div>

    </div>

    <!-- CAROUSEL -->
    <div id="carouselExample"
    class="carousel slide mt-5">

      <div class="carousel-inner">

        <div class="carousel-item active">

          <img src="https://picsum.photos/1200/400?1"
          class="d-block w-100">

        </div>

        <div class="carousel-item">

          <img src="https://picsum.photos/1200/400?2"
          class="d-block w-100">

        </div>

        <div class="carousel-item">

          <img src="https://picsum.photos/1200/400?3"
          class="d-block w-100">

        </div>

      </div>

      <button class="carousel-control-prev"
      type="button"
      data-bs-target="#carouselExample"
      data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

      </button>

      <button class="carousel-control-next"
      type="button"
      data-bs-target="#carouselExample"
      data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

      </button>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
